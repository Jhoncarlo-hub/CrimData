<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CRRDAIS</title>
    <script>
      // SPA redirect: sends the path to index.html via sessionStorage
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
